spring.application.name=distributed-crawler
server.port=8081

# Redis Configuration (Port remains standard, Host is resolved dynamically)
spring.data.redis.port=6379

# Management Endpoints Configuration (Actuator Metrics)
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.metrics.enabled=true
management.health.kafka.enabled=false

# Local Ollama Core Chat Model Target Configuration
spring.ai.ollama.chat.options.model=llama3.2:1b

# Vector Embedding Model Selection
spring.ai.ollama.embedding.options.model=all-minilm

# ==========================================
# \uD83D\uDC33 DYNAMIC DOCKER INFRASTRUCTURE ENVIRONMENT ROUTING
# ==========================================
# These will use the docker-compose service names when in a container, 
# or default back to local host if run directly from your IDE.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/crawler_db}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}